name: pokedex
description: 'Mobile Pokédex app developed in Flutter, focused on viewing, searching, and exploring Pokémon, using data from the PokeAPI.'
publish_to: 'none'
version: 1.0.0+1

environment:
    sdk: ^3.11.3

dependencies:
    flutter:
        sdk: flutter

    # GraphQL client, cache, and network layer
    graphql_flutter: ^5.3.0

    # Declarative routing
    go_router: ^14.2.3

    # JSON annotations for code generation
    json_annotation: ^4.9.0

    # Local persistent storage for GraphQL cache
    hive_flutter: ^1.1.0

    # State management and dependency injection
    flutter_riverpod: ^3.3.1
    flutter_svg: 2.0.10+1

dev_dependencies:
    flutter_test:
        sdk: flutter

    # Code generation for JSON models
    json_serializable: ^6.8.0
    build_runner: ^2.4.13

    flutter_lints: ^6.0.0

flutter:
    uses-material-design: true
    assets:
        - assets/
        - assets/types/
